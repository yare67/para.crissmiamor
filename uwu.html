<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Para mi amor Criss</title>
    <style>
        body {
            background-color: #fff0f3;
            font-family: 'Arial Rounded MT Bold', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
            text-align: center;
        }

        .card {
            background: white;
            padding: 30px;
            border-radius: 30px;
            box-shadow: 0 10px 40px rgba(255, 77, 109, 0.4);
            border: 6px solid #ffccd5;
            z-index: 10;
            width: 350px;
        }

        .snoopy {
            width: 150px;
            margin-bottom: 10px;
        }

        h1 { color: #ff4d6d; font-size: 24px; margin: 10px 0; }
        
        .carta {
            font-size: 16px;
            color: #594157;
            margin-bottom: 20px;
            line-height: 1.5;
            padding: 0 10px;
        }

        /* BOTÓN DE SPOTIFY REHECHO */
        .btn-spotify {
            background-color: #1DB954;
            color: white !important;
            text-decoration: none;
            padding: 15px 25px;
            border-radius: 50px;
            font-weight: bold;
            display: inline-block;
            box-shadow: 0 4px 15px rgba(29, 185, 84, 0.3);
            transition: 0.3s;
            margin-top: 10px;
        }

        .btn-spotify:hover {
            transform: scale(1.05);
            background-color: #1ed760;
        }

        .heart {
            position: fixed;
            top: -50px;
            color: #ff758f;
            font-size: 25px;
            pointer-events: none;
            animation: fall linear forwards;
            z-index: 1;
        }

        @keyframes fall {
            to { transform: translateY(110vh) rotate(360deg); opacity: 0; }
        }
    </style>
</head>
<body onclick="createHeart()">

    <div class="card">
        <img src="https://media.giphy.com/media/26FLdmIp6wJr91JAI/giphy.gif" class="snoopy" alt="Snoopy">
        
        <h1>¡Te amo, Criss! ❤️</h1>
        
        <div class="carta">
            teamo miamor eres lo mejor que me pudo pasar en esta vida jamás me dejes poq yo kiero tener un par de chamakitos con tu adn y  q salga la carita esa q tu tienes 💘💘
        </div>
        
        <p style="font-size: 14px; color: #ff4d6d; font-weight: bold;">🎵 Dale play aquí abajo:</p>
        
        <a href="https://open.spotify.com/intl-es/track/0QLthYlRZYAP9iRs9cjmzD?si=972b6b668bf44d6c" target="_blank" class="btn-spotify">
            Escuchar en Spotify 🎧
        </a>

        <p style="font-size: 11px; color: #aaa; margin-top: 15px;">Toca cualquier parte para más corazones</p>
    </div>

    <script>
        function createHeart() {
            const heart = document.createElement('div');
            heart.classList.add('heart');
            const icons = ['❤️', '💖', '💕', '🐾'];
            heart.innerHTML = icons[Math.floor(Math.random() * icons.length)];
            heart.style.left = Math.random() * 100 + 'vw';
            heart.style.fontSize = Math.random() * 20 + 20 + 'px';
            heart.style.animationDuration = Math.random() * 3 + 2 + 's';
            document.body.appendChild(heart);
            setTimeout(() => { heart.remove(); }, 5000);
        }

        // Lluvia permanente
        setInterval(createHeart, 300);
    </script>
</body>
</html>
